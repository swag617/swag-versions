name: Post Changelog to Discord

on:
  push:
    branches: [main]
    paths:
      - 'versions.json'   # only trigger when versions.json actually changes

jobs:
  post-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout swag-versions
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need previous commit to diff against

      - name: Detect what changed
        id: detect
        run: |
          # Diff versions.json between this commit and the previous one
          # Finds which plugin entry changed and what the new version is
          DIFF=$(git diff HEAD~1 HEAD -- versions.json)

          # Extract plugin name — the key whose version changed
          PLUGIN=$(echo "$DIFF" | grep '^+' | grep -o '"[A-Za-z]*":' | head -1 | tr -d '":')

          # Extract new version
          NEW_VERSION=$(echo "$DIFF" | grep '^+' | grep '"version"' | head -1 \
            | grep -o '"[0-9][^"]*"' | tr -d '"')

          # Extract download URL (used to pull the release notes via GitHub API)
          DOWNLOAD_URL=$(echo "$DIFF" | grep '^+' | grep '"download"' | head -1 \
            | grep -o 'https://[^"]*' | head -1)

          echo "PLUGIN=$PLUGIN" >> $GITHUB_ENV
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV

          echo "Detected update: $PLUGIN → v$NEW_VERSION"

          # Abort if we couldn't detect a plugin (e.g. formatting-only commit)
          if [ -z "$PLUGIN" ] || [ -z "$NEW_VERSION" ]; then
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Fetch release notes from GitHub API
        if: env.SKIP == 'false'
        run: |
          # Find the latest release for this plugin repo
          RELEASE_DATA=$(curl -s \
            -H "Authorization: token ${{ secrets.VERSIONS_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/swag617/$PLUGIN/releases/latest")

          RELEASE_NOTES=$(echo "$RELEASE_DATA" | jq -r '.body // ""')
          RELEASE_URL=$(echo "$RELEASE_DATA" | jq -r '.html_url // ""')

          if [ -z "$RELEASE_NOTES" ] || [ "$RELEASE_NOTES" = "null" ]; then
            RELEASE_NOTES="No release notes provided."
          fi

          echo "RELEASE_URL=$RELEASE_URL" >> $GITHUB_ENV

          # Save multiline release notes safely
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo "$RELEASE_NOTES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Generate player-friendly changelog via Gemini
        if: env.SKIP == 'false'
        run: |
          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg plugin "$PLUGIN" \
              --arg version "$NEW_VERSION" \
              --arg notes "$RELEASE_NOTES" \
              '{
                contents: [{
                  parts: [{
                    text: ("You are writing a changelog for a Minecraft server Discord called FleaMC. Convert these developer release notes into a short, exciting, player-friendly announcement. Use plain language players understand — no technical jargon. Use emojis. Keep it under 10 bullet points. Do not mention version numbers, internal code details, or technical class names. Plugin: " + $plugin + " v" + $version + ".\n\nDeveloper notes:\n" + $notes)
                  }]
                }]
              }')")

          SUMMARY=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // ""')

          if [ -z "$SUMMARY" ] || [ "$SUMMARY" = "null" ]; then
            SUMMARY="$PLUGIN has been updated to v$NEW_VERSION!"
          fi

          echo "CHANGELOG_SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$SUMMARY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "Generated:"
          echo "$SUMMARY"

      - name: Post to Discord
        if: env.SKIP == 'false'
        run: |
          PAYLOAD=$(jq -n \
            --arg title "🔧 $PLUGIN v$NEW_VERSION" \
            --arg description "$CHANGELOG_SUMMARY" \
            --arg url "$RELEASE_URL" \
            '{
              embeds: [{
                title: $title,
                description: $description,
                color: 5814783,
                url: $url,
                footer: { text: "FleaMC • Auto-generated changelog" },
                timestamp: (now | todate)
              }]
            }')

          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "Posted to Discord."